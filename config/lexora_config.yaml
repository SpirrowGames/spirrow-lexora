# Lexora Configuration for AIサーバー

server:
  host: "0.0.0.0"
  port: 8110

# 統一バックエンド: Qwen3-32B (thinking/non-thinking切り替え)
routing:
  enabled: true
  default_backend: "heavy"
  default_model_for_unknown_task: "Qwen3-32B"

  # タスク分類設定
  classifier:
    enabled: true
    model: "Qwen3-32B"
    backend: "light"

  backends:
    heavy:
      type: "vllm"
      url: "http://localhost:8000"
      timeout: 120.0
      connect_timeout: 5.0
      thinking_mode: "think"
      models:
        - name: "Qwen3-32B"
          capabilities: ["code", "reasoning", "analysis"]
          description: "複雑なタスク向け (thinking mode)"
      fallback_backends:
        - "claude"
        - "openai_gpt4"

    light:
      type: "vllm"
      url: "http://localhost:8000"
      timeout: 60.0
      connect_timeout: 5.0
      thinking_mode: "no_think"
      models:
        - name: "Qwen3-32B"
          capabilities: ["summarization", "translation", "simple_qa", "general"]
          description: "軽量タスク向け (non-thinking mode)"
      fallback_backends:
        - "openai_gpt4"

    # OpenAI互換API例（環境変数 OPENAI_API_KEY からAPIキー取得）
    openai_gpt4:
      type: "openai_compatible"
      url: "https://api.openai.com"
      api_key_env: "OPENAI_API_KEY"
      timeout: 60.0
      connect_timeout: 5.0
      models:
        # 従来形式もサポート（後方互換: capabilities=["general"]扱い）
        - "gpt-4"
        - "gpt-4-turbo"
      model_mapping:
        "gpt-4": "gpt-4-0125-preview"
        "gpt-4-turbo": "gpt-4-turbo-preview"

    # Google Gemini API (OpenAI互換エンドポイント)
    gemini:
      type: "openai_compatible"
      url: "https://generativelanguage.googleapis.com/v1beta/openai"
      api_key_env: "GEMINI_API_KEY"
      timeout: 120.0
      connect_timeout: 5.0
      models:
        - name: "gemini-2.5-flash"
          capabilities: ["code", "reasoning", "analysis", "general"]
          description: "Google Gemini 2.5 Flash"
      fallback_backends: []

    # Claude Code CLI (non-interactive mode)
    claude_code:
      type: "claude_code"
      url: "localhost"  # unused but required by schema
      timeout: 600.0
      connect_timeout: 5.0
      models:
        - name: "claude-code-opus"
          capabilities: ["code", "reasoning", "analysis", "agentic"]
          description: "Claude Code (Opus) - agentic coding with tool use"
        - name: "claude-code-sonnet"
          capabilities: ["code", "reasoning", "general"]
          description: "Claude Code (Sonnet) - fast coding assistant"
      model_mapping:
        # CLI model arg (--model)
        "claude-code-opus": "opus"
        "claude-code-sonnet": "sonnet"
        # Extra config via model_mapping (factory reads these)
        "model": "sonnet"  # default CLI model
        "max_turns": "1"  # prevent agentic tool use for simple completions
        # "working_dir": "/home/sgadmin"
      fallback_backends:
        - "claude"

    # Anthropic Claude API
    claude:
      type: "anthropic"
      url: "https://api.anthropic.com"
      api_key_env: "ANTHROPIC_API_KEY"
      timeout: 120.0
      connect_timeout: 5.0
      models:
        - name: "claude-sonnet-4-20250514"
          capabilities: ["code", "reasoning", "analysis", "general"]
          description: "Anthropic Claude Sonnet 4"
      fallback_backends: []

queue:
  max_size: 1000
  default_timeout: 60.0

rate_limit:
  enabled: true
  default_rate: 10.0
  default_burst: 20

retry:
  max_retries: 3
  base_delay: 1.0
  max_delay: 30.0
  exponential_base: 2.0
  respect_retry_after: true
  max_retry_after: 60.0

fallback:
  enabled: true
  on_rate_limit: true

logging:
  level: "INFO"
  format: "json"
